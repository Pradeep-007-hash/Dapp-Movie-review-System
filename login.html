<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineReview - Sign In</title>
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Ethers.js CDN for Web3/MetaMask Login -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    :root {
      --bg-base: #080b11;
      --bg-surface: #0f1422;
      --bg-panel: #161f33;
      --primary: #6366f1; /* Indigo */
      --primary-hover: #4f46e5;
      --secondary: #d946ef; /* Magenta */
      --accent: #10b981; /* Emerald */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(99, 102, 241, 0.5);
      --shadow-glow: rgba(99, 102, 241, 0.15);
      --font-family: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(217, 70, 239, 0.08) 0%, transparent 45%);
      background-attachment: fixed;
      padding: 1.5rem;
    }

    /* Logo Header */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      animation: fadeInDown 0.6s ease-out;
    }

    .logo-icon {
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* Glassmorphic Login Card */
    .login-card {
      background: rgba(15, 20, 34, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      text-align: center;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(22, 31, 51, 0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    /* Eye toggle icon */
    .toggle-password {
      position: absolute;
      right: 12px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
      user-select: none;
      transition: color 0.3s;
    }

    .toggle-password:hover {
      color: var(--text-main);
    }

    /* Card Options (Remember & Forgot) */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
      font-size: 0.85rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .remember-me input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: var(--secondary);
    }

    /* Buttons */
    .web3-login-btn {
      width: 100%;
      padding: 1.1rem 1.5rem;
      background: rgba(227, 117, 34, 0.08);
      border: 1px solid rgba(227, 117, 34, 0.4);
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(227, 117, 34, 0.15);
    }

    .web3-login-btn:hover {
      background: rgba(227, 117, 34, 0.15);
      border-color: rgba(227, 117, 34, 0.7);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(227, 117, 34, 0.25);
    }

    .web3-login-btn:active {
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.75rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider:not(:empty)::before {
      margin-right: .75em;
    }

    .divider:not(:empty)::after {
      margin-left: .75em;
    }

    /* OAuth Social Group */
    .oauth-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .oauth-btn {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(22, 31, 51, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: all 0.3s ease;
    }

    .oauth-btn:hover {
      background: rgba(22, 31, 51, 0.9);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 400px;
      width: 90%;
    }

    .toast {
      background: var(--bg-panel);
      border-left: 4px solid var(--primary);
      color: var(--text-main);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      border: 1px solid var(--border);
      border-left-width: 4px;
    }

    .toast.success {
      border-left-color: var(--accent);
    }

    .toast.error {
      border-left-color: #ef4444;
    }

    .toast.warning {
      border-left-color: #f59e0b;
    }

    .toast-close {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.2rem;
      line-height: 1;
    }

    .toast-close:hover {
      color: white;
    }

    /* Keyframes */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Footer link */
    .signup-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .signup-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link:hover {
      color: var(--secondary);
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <span class="logo-icon">🎬</span>
    <span class="logo-text">CineReview</span>
  </div>

  <div class="login-card">
    <h2 class="card-title">Connect Wallet</h2>
    <p class="card-subtitle" style="margin-bottom: 1.75rem;">Connect your Web3 wallet to share and view decentralized movie reviews</p>

    <!-- MetaMask Web3 Login -->
    <button class="web3-login-btn" onclick="handleMetaMaskLogin()">
      <svg viewBox="0 0 32 32" width="28" height="28">
        <path fill="#e17726" d="M30.8 14.5l-2.4-7.9-3.2-3.8-9.2-1.3-9.2 1.3-3.2 3.8-2.4 7.9c-.3.9.1 1.9.9 2.3l11.4 7.1 2.9-2.3-2.9-2.6-3.8-1-5.6.8.6-4.5 5 1.3 3.8.3.6-4.5-3.8-.5-5.6-1.5 1.7-2.6 6.8.5 3.9-.9.5 4.8-3.9 1.1-2.9 2.9v1.9l2.9.8h3.8l2.9-2.1.2-1.3z"/>
      </svg>
      <span>Connect MetaMask Wallet</span>
    </button>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <span>${message}</span>
        <span class="toast-close" onclick="this.parentElement.remove()">&times;</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentElement) {
          toast.remove();
        }
      }, 5000);
    }

    async function ensureSepoliaNetwork() {
      if (typeof window.ethereum === "undefined") return false;
      const SEPOLIA_CHAIN_ID = "0xaa36a7"; // 11155111
      try {
        const currentChainId = await window.ethereum.request({ method: "eth_chainId" });
        if (currentChainId !== SEPOLIA_CHAIN_ID) {
          showToast("Switching network to Sepolia...", "info");
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: SEPOLIA_CHAIN_ID }],
            });
            return true;
          } catch (switchError) {
            if (switchError.code === 4902) {
              try {
                await window.ethereum.request({
                  method: "wallet_addEthereumChain",
                  params: [
                    {
                      chainId: SEPOLIA_CHAIN_ID,
                      chainName: "Sepolia Test Network",
                      rpcUrls: ["https://rpc.ankr.com/eth_sepolia", "https://sepolia.infura.io/v3/cb4e5d62e5e34edda4ff0f1b6b8c3b0f"],
                      nativeCurrency: {
                        name: "Sepolia Ether",
                        symbol: "ETH",
                        decimals: 18
                      },
                      blockExplorerUrls: ["https://sepolia.etherscan.io"]
                    }
                  ],
                });
                return true;
              } catch (addError) {
                showToast("Failed to add Sepolia network: " + addError.message, "error");
                return false;
              }
            } else {
              showToast("Failed to switch network: " + switchError.message, "error");
              return false;
            }
          }
        }
        return true;
      } catch (err) {
        showToast("Error checking network: " + err.message, "error");
        return false;
      }
    }

    async function handleMetaMaskLogin() {
      if (typeof window.ethereum !== "undefined") {
        try {
          const isSepolia = await ensureSepoliaNetwork();
          if (!isSepolia) {
            showToast("Please switch network to Sepolia to login with MetaMask.", "warning");
            return;
          }
          showToast("Requesting MetaMask connection...", "info");
          const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
          const address = accounts[0];
          
          sessionStorage.setItem("user", address);
          showToast("Authenticated via MetaMask! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
        } catch (err) {
          showToast("MetaMask Connection Cancelled: " + err.message, "error");
        }
      } else {
        showToast("MetaMask extension not found! Falling back to demo login.", "warning");
        setTimeout(() => {
          sessionStorage.setItem("user", "DemoWeb3User");
          showToast("Authenticated via Demo Wallet Address! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
        }, 1500);
      }
    }

    // Auto-login check
    window.onload = function() {
      if (sessionStorage.getItem("user")) {
        showToast("Active session found. Redirecting to Dashboard...", "info");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      }
    }
  </script>
</body>
</html>
