<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineReview - Immersive Sign In & Portal</title>
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Ethers.js CDN for Web3/MetaMask Login -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <!-- Tailwind CSS CDN for premium utility styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              base: '#080b11',
              surface: '#0f1422',
              panel: '#161f33',
              primary: '#6366f1',
              primaryHover: '#4f46e5',
              secondary: '#d946ef',
              accent: '#10b981',
              textMain: '#f8fafc',
              textMuted: '#94a3b8',
              border: 'rgba(255, 255, 255, 0.08)',
              borderFocus: 'rgba(99, 102, 241, 0.5)',
              shadowGlow: 'rgba(99, 102, 241, 0.15)',
            }
          },
          fontFamily: {
            outfit: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #d946ef;
      --accent: #10b981;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #080b11;
      color: #f8fafc;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Custom Glassmorphism Utility */
    .glass-card {
      background: rgba(15, 20, 34, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    /* Interactive Spotlights in BG */
    #backgroundCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .animate-pulse-glow {
      animation: pulseGlow 4s infinite ease-in-out;
    }

    /* Toast Notification style override */
    .toast-card {
      background: rgba(22, 31, 51, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative p-4 md:p-8">

  <!-- Interactive Canvas Background (Projector Spotlights & Dust Particles) -->
  <canvas id="backgroundCanvas"></canvas>

  <div class="relative z-10 w-full max-w-md flex flex-col items-center" id="portalContainer">
    
    <!-- BRAND HEADER -->
    <div class="flex items-center gap-3 mb-6 cursor-pointer select-none transition-transform duration-300 hover:scale-105" onclick="playBeep(440, 0.1)" id="brandHeader">
      <div class="text-4xl bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 bg-clip-text text-transparent font-extrabold flex items-center">
        <span class="mr-2 filter drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]">🎬</span>
        <span class="font-outfit tracking-tight">CineReview</span>
      </div>
      <span class="text-xs px-2 py-1 rounded bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 font-semibold tracking-wider uppercase">v2.0 Web3</span>
    </div>

    <!-- MAIN SIGN IN CARD -->
    <div id="authCardContainer" class="w-full transition-all duration-500 transform scale-100 opacity-100">
      <div class="glass-card rounded-3xl p-6 md:p-8 relative overflow-hidden transition-all duration-300 shadow-2xl" id="tiltCard">
        
        <!-- Subtle interactive border shine -->
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-pink-500/5 pointer-events-none"></div>
        
        <h2 class="text-2xl font-bold text-center text-white mb-1">Connect Wallet</h2>
        <p class="text-sm text-brand-textMuted text-center mb-8">Connect your Web3 wallet to share and view decentralized movie reviews</p>

        <div class="space-y-6">
          <div class="text-center py-6 px-4 bg-brand-surface/40 rounded-2xl border border-white/5 mb-4">
            <div class="relative w-16 h-16 mx-auto mb-3 flex items-center justify-center bg-orange-500/10 rounded-full border border-orange-500/20">
              <span class="text-3xl animate-pulse-glow">🦊</span>
            </div>
            <h3 class="text-white font-semibold text-base mb-1">Verify Decentralized Identity</h3>
            <p class="text-xs text-brand-textMuted leading-relaxed max-w-xs mx-auto">Interacts with Sepolia Smart Contracts to guarantee tamper-proof user reviews.</p>
          </div>

          <!-- Connect button -->
          <button onclick="handleMetaMaskLogin()" class="w-full py-4 px-6 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 font-bold border border-orange-500/40 bg-orange-500/10 hover:bg-orange-500/25 active:scale-[0.99] cursor-pointer hover:shadow-[0_0_20px_rgba(227,117,34,0.2)]">
            <svg viewBox="0 0 32 32" class="w-6 h-6 animate-bounce">
              <path fill="#e17726" d="M30.8 14.5l-2.4-7.9-3.2-3.8-9.2-1.3-9.2 1.3-3.2 3.8-2.4 7.9c-.3.9.1 1.9.9 2.3l11.4 7.1 2.9-2.3-2.9-2.6-3.8-1-5.6.8.6-4.5 5 1.3 3.8.3.6-4.5-3.8-.5-5.6-1.5 1.7-2.6 6.8.5 3.9-.9.5 4.8-3.9 1.1-2.9 2.9v1.9l2.9.8h3.8l2.9-2.1.2-1.3z" />
            </svg>
            <span style="color: #e17726;" class="tracking-wide text-sm">Connect MetaMask Wallet</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST SYSTEM CONTAINER -->
  <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full" id="toastContainer"></div>

  <script>
    /* UI AUDIO SYNTHESIS via Web Audio API */
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playBeep(freq = 440, duration = 0.1, type = 'sine') {
      try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (err) {}
    }

    function playSuccessSound() {
      setTimeout(() => playBeep(523.25, 0.15, 'triangle'), 0); // C5
      setTimeout(() => playBeep(659.25, 0.15, 'triangle'), 80); // E5
      setTimeout(() => playBeep(783.99, 0.25, 'triangle'), 160); // G5
    }

    function playErrorSound() {
      setTimeout(() => playBeep(180, 0.2, 'sawtooth'), 0);
      setTimeout(() => playBeep(140, 0.3, 'sawtooth'), 120);
    }

    /* INTERACTIVE CANVAS BACKGROUND: Spotlights & Cinema Dust */
    const canvas = document.getElementById("backgroundCanvas");
    const ctx = canvas.getContext("2d");
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    window.addEventListener('mousemove', (e) => {
      mouse.targetX = e.clientX;
      mouse.targetY = e.clientY;
    });

    // Dust particles
    const particles = [];
    const particleCount = 45;
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 1.8 + 0.4,
        speedX: Math.random() * 0.3 - 0.15,
        speedY: Math.random() * 0.2 - 0.05,
        alpha: Math.random() * 0.4 + 0.1
      });
    }

    function animateBackground() {
      mouse.x += (mouse.targetX - mouse.x) * 0.05;
      mouse.y += (mouse.targetY - mouse.y) * 0.05;

      ctx.fillStyle = "#080b11";
      ctx.fillRect(0, 0, width, height);

      // Projector Light 1
      const grad1 = ctx.createRadialGradient(
        width * 0.15 + (mouse.x * 0.05), height * 0.15 + (mouse.y * 0.05), 10,
        width * 0.15, height * 0.15, Math.max(width, height) * 0.5
      );
      grad1.addColorStop(0, 'rgba(99, 102, 241, 0.15)');
      grad1.addColorStop(0.5, 'rgba(99, 102, 241, 0.03)');
      grad1.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad1;
      ctx.fillRect(0, 0, width, height);

      // Mouse Spotlight
      const grad2 = ctx.createRadialGradient(
        mouse.x, mouse.y, 0,
        mouse.x, mouse.y, Math.max(width, height) * 0.3
      );
      grad2.addColorStop(0, 'rgba(217, 70, 239, 0.08)');
      grad2.addColorStop(0.5, 'rgba(217, 70, 239, 0.015)');
      grad2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad2;
      ctx.fillRect(0, 0, width, height);

      // Render dust
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;

        const distToMouse = Math.hypot(p.x - mouse.x, p.y - mouse.y);
        let illumination = 1.0;
        if (distToMouse < 250) {
          illumination += (1 - distToMouse / 250) * 1.5;
        }

        ctx.fillStyle = `rgba(148, 163, 184, ${p.alpha * illumination})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animateBackground);
    }
    animateBackground();

    /* CARD 3D PARALLAX EFFECT */
    const cardElement = document.getElementById("tiltCard");
    window.addEventListener('mousemove', (e) => {
      const bounding = cardElement.getBoundingClientRect();
      const x = e.clientX - bounding.left;
      const y = e.clientY - bounding.top;
      const xc = bounding.width / 2;
      const yc = bounding.height / 2;
      const angleX = -(yc - y) / 18; 
      const angleY = (xc - x) / 18; 
      cardElement.style.transform = `perspective(1000px) rotateX(${angleX}deg) rotateY(${angleY}deg) scale3d(1.01, 1.01, 1.01)`;
    });

    cardElement.addEventListener('mouseleave', () => {
      cardElement.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
    });
  </script>

  <script>
    /* DYNAMIC TOAST SYSTEM */
    function showToast(message, type = 'info') {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      
      let borderColor = 'var(--primary)';
      if (type === 'success') borderColor = 'var(--accent)';
      else if (type === 'error') borderColor = '#ef4444';
      else if (type === 'warning') borderColor = '#f59e0b';

      toast.className = `toast-card p-4 rounded-xl shadow-lg border border-white/5 flex justify-between items-center gap-3 transition-all duration-300 transform translate-x-12 opacity-0 text-xs`;
      toast.style.borderLeft = `4px solid ${borderColor}`;
      toast.innerHTML = `
        <span class="font-medium text-slate-100">${message}</span>
        <button class="text-brand-textMuted hover:text-white text-base cursor-pointer" onclick="this.parentElement.remove()">&times;</button>
      `;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove("translate-x-12", "opacity-0");
      }, 50);

      setTimeout(() => {
        if (toast.parentElement) {
          toast.classList.add("opacity-0", "translate-y-2");
          setTimeout(() => toast.remove(), 300);
        }
      }, 5000);
    }

    async function ensureSepoliaNetwork() {
      if (typeof window.ethereum === "undefined") return false;
      const SEPOLIA_CHAIN_ID = "0xaa36a7"; // 11155111
      try {
        const currentChainId = await window.ethereum.request({ method: "eth_chainId" });
        if (currentChainId !== SEPOLIA_CHAIN_ID) {
          showToast("Switching network to Sepolia...", "info");
          playBeep(350, 0.15);
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: SEPOLIA_CHAIN_ID }],
            });
            return true;
          } catch (switchError) {
            if (switchError.code === 4902) {
              try {
                await window.ethereum.request({
                  method: "wallet_addEthereumChain",
                  params: [
                    {
                      chainId: SEPOLIA_CHAIN_ID,
                      chainName: "Sepolia Test Network",
                      rpcUrls: ["https://rpc.ankr.com/eth_sepolia", "https://sepolia.infura.io/v3/cb4e5d62e5e34edda4ff0f1b6b8c3b0f"],
                      nativeCurrency: {
                        name: "Sepolia Ether",
                        symbol: "ETH",
                        decimals: 18
                      },
                      blockExplorerUrls: ["https://sepolia.etherscan.io"]
                    }
                  ],
                });
                return true;
              } catch (addError) {
                showToast("Failed to add Sepolia network: " + addError.message, "error");
                playErrorSound();
                return false;
              }
            } else {
              showToast("Failed to switch network: " + switchError.message, "error");
              playErrorSound();
              return false;
            }
          }
        }
        return true;
      } catch (err) {
        showToast("Error checking network: " + err.message, "error");
        playErrorSound();
        return false;
      }
    }

    async function handleMetaMaskLogin() {
      playBeep(440, 0.1);
      if (typeof window.ethereum !== "undefined") {
        try {
          const isSepolia = await ensureSepoliaNetwork();
          if (!isSepolia) {
            showToast("Please switch network to Sepolia to login with MetaMask.", "warning");
            return;
          }
          showToast("Requesting MetaMask connection...", "info");
          const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
          const address = accounts[0];
          
          sessionStorage.setItem("user", address);
          playSuccessSound();
          showToast("Authenticated via MetaMask! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
        } catch (err) {
          playErrorSound();
          showToast("MetaMask Connection Cancelled: " + err.message, "error");
        }
      } else {
        playErrorSound();
        showToast("MetaMask extension not found! Falling back to demo login.", "warning");
        setTimeout(() => {
          sessionStorage.setItem("user", "DemoWeb3User");
          playSuccessSound();
          showToast("Authenticated via Demo Wallet Address! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
        }, 1500);
      }
    }

    // Auto-login check
    window.onload = function() {
      if (sessionStorage.getItem("user")) {
        showToast("Active session found. Redirecting to Dashboard...", "info");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      }
    }
  </script>
</body>
</html>
